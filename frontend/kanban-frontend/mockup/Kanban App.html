<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban — Personal Board</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN (v3, play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          keyframes: {
            slideIn: {
              '0%':   { opacity: '0', transform: 'translateX(16px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
          },
          animation: {
            slideIn: 'slideIn 0.2s ease-out',
          },
        },
      },
    };
  </script>

  <!-- React 18 + Babel standalone -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; }

    /* Thin, subtle scrollbars */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Remove number-input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Drag ghost: browser default is fine, but dim it */
    [draggable=true] { -webkit-user-drag: element; }
  </style>
</head>
<body class="bg-slate-950">

  <div id="root"></div>

  <!-- 1. Seed data -->
  <script src="mockData.js"></script>

  <!-- 2. Fake service layer -->
  <script src="services.js"></script>

  <!-- 3. Shared UI primitives (AppContext, Toast, Badge, …) -->
  <script type="text/babel" src="components/ui.jsx"></script>

  <!-- 4. Auth pages -->
  <script type="text/babel" src="components/auth.jsx"></script>

  <!-- 5. Ticket modal -->
  <script type="text/babel" src="components/modal.jsx"></script>

  <!-- 6. Board, Column, TicketCard (depends on TicketModal, Badge, ConfirmDialog) -->
  <script type="text/babel" src="components/board.jsx"></script>

  <!-- 7. Admin view (depends on Board) -->
  <script type="text/babel" src="components/admin.jsx"></script>

  <!-- 8. App root — mounts the React tree -->
  <script type="text/babel" src="App.jsx"></script>

</body>
</html>
